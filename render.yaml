services:
  - type: web
    name: naval-war-server
    runtime: node
    buildCommand: npm ci
    startCommand: npm run start --workspace=@naval-war/server
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: CLIENT_URL
        sync: false
